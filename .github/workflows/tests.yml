name: tests

on:
  push:
  pull_request:

jobs:
  safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run safety tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v
